version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: sinhas_track_mongodb
    environment:
      MONGO_INITDB_DATABASE: workforce-vision
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sinhas_network

  backend:
    build: .
    container_name: sinhas_track_backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017/workforce-vision
      FLASK_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - .:/app
    networks:
      - sinhas_network
    command: python -m flask run --host=0.0.0.0

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: sinhas_track_frontend
    environment:
      VITE_MONGODB_API_URL: http://backend:5000/api
      VITE_WS_URL: http://backend:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - sinhas_network

volumes:
  mongodb_data:

networks:
  sinhas_network:
    driver: bridge
